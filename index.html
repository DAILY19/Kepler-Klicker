<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kepler Klicker</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;800&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ======== BACKGROUND LAYERS ======== -->
  <div id="bg-layers">
    <div class="bg-layer" id="bg-void"></div>
    <div class="bg-layer" id="bg-stars-1"></div>
    <div class="bg-layer" id="bg-stars-2"></div>
  </div>

  <!-- ======== FLOATING NUMBERS CONTAINER ======== -->
  <div id="float-numbers"></div>

  <!-- ======== HEADER ======== -->
  <header id="header">
    <div class="header-inner">
      <!-- Audio controls — top left -->
      <div id="settings-bar-left">
        <button id="btn-music" class="btn-icon" title="Toggle music">
          <img src="assets/UI/Buttons/BTNs/Music_BTN.png" alt="Music" draggable="false">
        </button>
        <button id="btn-sfx" class="btn-icon" title="Toggle sound effects">
          <img src="assets/UI/Buttons/BTNs_Active/Sound_BTN.png" alt="SFX" draggable="false">
        </button>
        <button id="btn-next-track" class="btn-icon" title="Next music track">
          <img src="assets/UI/Buttons/BTNs/Forward_BTN.png" alt="Next track" draggable="false">
        </button>
      </div>
      <div class="header-center">
        <h1 class="title"><span class="title-glow">Kepler Klicker</span></h1>
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">Stardust</span>
            <span class="stat-value" id="stardust-count">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">per second</span>
            <span class="stat-value" id="per-second">0</span>
          </div>
        </div>
        <div id="user-bar" hidden>
          <span class="user-bar-label">Signed in as</span>
          <span id="user-bar-name" class="user-bar-name"></span>
        </div>
      </div>
      <!-- Game/social controls — top right -->
      <div id="settings-bar">
        <button id="btn-reset" class="btn-icon" title="Reset game">
          <img src="assets/UI/Buttons/BTNs/Replay_BTN.png" alt="Reset" draggable="false">
        </button>
        <button id="btn-leaderboard" class="btn-icon" title="Leaderboard">
          <img src="assets/UI/Buttons/BTNs/Rating_BTN.png" alt="Leaderboard" draggable="false">
        </button>
        <button id="btn-login" class="btn-icon" title="Sign in">
          <img src="assets/UI/Buttons/BTNs/Google_BTN.png" alt="Sign in" draggable="false">
        </button>
      </div>
    </div>
  </header>

  <!-- ======== MAIN GAME AREA ======== -->
  <main id="game-area">
    <div id="planet-wrapper">
      <div id="planet" role="img" aria-label="Planet"></div>
    </div>
  </main>

  <!-- ======== UPGRADE SHOP ======== -->
  <aside id="shop">
    <div class="shop-header">
      <h2>Upgrades</h2>
      <button id="btn-toggle-shop" class="btn-icon-only" aria-label="Toggle shop">&#9650;</button>
    </div>
    <div id="shop-list" class="shop-list"></div>
  </aside>

  <!-- ======== MODALS ======== -->
  <div id="modal-overlay" hidden>

    <!-- Login / Sign-in panel -->
    <div id="login-panel" class="modal-panel" hidden>
      <h2 class="modal-title">Sign In</h2>
      <p class="modal-desc">Save your progress and compete on the global leaderboard.</p>
      <button id="btn-google-signin" class="btn-modal-primary">
        <img src="assets/UI/Buttons/BTNs_Active/Google_BTN.png" alt="" draggable="false">
        Sign in with Google
      </button>
      <div class="modal-divider"><span>or</span></div>
      <button id="btn-guest-play" class="btn-modal-secondary modal-close-btn">Continue as Guest</button>
    </div>

    <!-- Profile panel (shown when logged in) -->
    <div id="profile-panel" class="modal-panel" hidden>
      <div id="profile-avatar" class="profile-avatar"></div>
      <h2 id="profile-name" class="modal-title">Explorer</h2>
      <p class="modal-desc">Total Stardust: <strong id="profile-score">0</strong></p>
      <button id="btn-signout" class="btn-modal-secondary">Sign Out</button>
    </div>

    <!-- Leaderboard panel -->
    <div id="leaderboard-panel" class="modal-panel" hidden>
      <h2 class="modal-title">Top Explorers</h2>
      <div id="leaderboard-list" class="leaderboard-list"></div>
      <button class="btn-modal-secondary modal-close-btn">Close</button>
    </div>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
